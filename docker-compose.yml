services:
  proxy:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - web
      - api
    networks:
      - internal
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/app/uploads:ro
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    expose:
      - "3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - internal
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kite360
      POSTGRES_PASSWORD: kite360pass
      POSTGRES_DB: kite360
    networks:
      - internal
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kite360"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  dbdata:
  uploads:
