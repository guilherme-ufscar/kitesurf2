services:
  proxy:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - web
      - api
    networks:
      - internal
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - internal
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["node", "dist/worker.js"]
    env_file: .env
    depends_on:
      - redis
      - db
    networks:
      - internal
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    networks:
      - internal
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kite360}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  dbdata:
  uploads:
